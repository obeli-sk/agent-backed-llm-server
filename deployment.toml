# agent-backed-llm-server: an OpenAI-compatible /v1/chat/completions endpoint
# backed by a warm claude/codex CLI in docker. See DESIGN.md for the design.
#
# content_digest is intentionally omitted (optional); obelisk resolves each
# component from its `location`. `just sync` fills digests from the live server.

# --- Agent lifecycle: provider-specific start (one per backend) ---------------
# Both point to agent-start.js; AGENT_BACKEND selects the auth mount + CLI, and
# the container's server.js spawns the right backend.

[[activity_exec]]
ffqn = "agent-backed-llm:agent/claude.start"
params = [
  { name = "container-name", type = "string" },
  { name = "socket",         type = "string" },
  { name = "system-prompt",  type = "string" },
]
return_type = "result<record { container: string, image: string, socket: string, id: string }, string>"
location = "activity/agent-start.js"
exec.lock_expiry.minutes = 2
max_retries = 1
env_vars = [
  "PATH",
  "HOME",
  { key = "AGENT_IMAGE",           value = "${AGENT_IMAGE:-docker.io/getobelisk/agent-backed-llm-server:latest}" },
  { key = "AGENT_BACKEND",         value = "claude" },
  { key = "AGENT_MODEL",           value = "${AGENT_MODEL:-claude-opus-4-7}" },
  { key = "AGENT_EXTRA_ARGS",      value = "${AGENT_EXTRA_ARGS:-}" },
  { key = "AGENT_HOST_CLAUDE_DIR", value = "${AGENT_HOST_CLAUDE_DIR:-${HOME}/.claude}" },
]
content_digest = "sha256:52394d8c340e8ae59527ccc7bd425f46a35f928a28caf919e0c74ac1774c7aae"

[[activity_exec]]
ffqn = "agent-backed-llm:agent/codex.start"
params = [
  { name = "container-name", type = "string" },
  { name = "socket",         type = "string" },
  { name = "system-prompt",  type = "string" },
]
return_type = "result<record { container: string, image: string, socket: string, id: string }, string>"
location = "activity/agent-start.js"
exec.lock_expiry.minutes = 2
max_retries = 1
env_vars = [
  "PATH",
  "HOME",
  { key = "AGENT_IMAGE",          value = "${AGENT_IMAGE:-docker.io/getobelisk/agent-backed-llm-server:latest}" },
  { key = "AGENT_BACKEND",        value = "codex" },
  { key = "AGENT_MODEL",          value = "${AGENT_CODEX_MODEL:-gpt-5.5}" },
  { key = "AGENT_EXTRA_ARGS",     value = "${AGENT_CODEX_EXTRA_ARGS:-}" },
  { key = "AGENT_HOST_CODEX_DIR", value = "${AGENT_HOST_CODEX_DIR:-${HOME}/.codex}" },
]
content_digest = "sha256:52394d8c340e8ae59527ccc7bd425f46a35f928a28caf919e0c74ac1774c7aae"

# --- Agent session: provider-agnostic send / recv / cleanup -------------------

[[activity_exec]]
ffqn = "agent-backed-llm:agent/session.send"
params = [
  { name = "socket", type = "string" },
  { name = "input", type = "variant { prompt(string), tool-results(list<record { name: string, outcome: result<string, string> }>) }" },
  { name = "operator-messages", type = "list<string>" },
]
return_type = "result<_, string>"
location = "activity/agent-send.js"
params_via_stdin = true
exec.lock_expiry.seconds = 30
max_retries = 3
env_vars = ["PATH"]
content_digest = "sha256:536a62d943260b22abcd501467cc819534b18a9cc930e238f0103afdc3e5bac4"

[[activity_exec]]
ffqn = "agent-backed-llm:agent/session.recv"
params = [
  { name = "socket", type = "string" },
  { name = "timeout-ms", type = "u32" },
]
return_type = "result<variant { working, reply(record { reply: variant { final(string), error(string), tool-calls(list<record { name: string, arguments-json: string }>) }, presentation: string, narration: string }) }, variant { permanent-rate-limited(record { retry-after-seconds: u32, message: string }), permanent-malformed-reply(string), permanent-agent-exited(string), permanent-error(string), transient-error(string), execution-failed }>"
location = "activity/agent-recv.js"
exec.lock_expiry.minutes = 10
max_output_bytes = 1048576
max_retries = 3
env_vars = ["PATH"]
content_digest = "sha256:b1a0cb695e54841f4c3cbe1c2ed28f944c0321a0ee9bf6e552a8360fa74fba86"

[[activity_exec]]
ffqn = "agent-backed-llm:agent/session.cleanup"
params = [
  { name = "container-name", type = "string" },
  { name = "socket",         type = "string" },
]
return_type = "result<_, string>"
location = "activity/agent-cleanup.js"
exec.lock_expiry.seconds = 30
max_retries = 3
env_vars = ["PATH"]
content_digest = "sha256:29350a3896ee19e9cf005669bfd2e60d6483f7178d33142a2689c8d5480dc2d6"

# --- The stub pair: webhook <-> session workflow rendezvous -------------------
# turn.request: workflow submits & awaits; webhook injects the delta by id. Its
#   params expose the paired response-id and the committed-history hash so the
#   webhook can pair a request and know where to read the reply. The ok payload
#   is the delta JSON; teardown is no longer an in-band arm (the frontend stops a
#   session by cancelling the loop.agent-loop-cancellable child instead).
# turn.response: workflow submits, then self-fulfils via responseStub; the
#   webhook reads it with obelisk.get (blocking).

[[activity_stub]]
name = "turn_request"
ffqn = "agent-backed-llm:session/turn.request"
params = [
  { name = "response-id",          type = "string" },
  { name = "expected-prefix-hash", type = "string" },
]
return_type = "result<string, string>"

[[activity_stub]]
name = "turn_response"
ffqn = "agent-backed-llm:session/turn.response"
params = []
return_type = "result<string, string>"

# --- Session workflow ---------------------------------------------------------
# workflow.session owns the container and drives the turn loop through the
# cancellable child below; digests are refilled by `just sync` after an edit.

[[workflow_js]]
ffqn = "agent-backed-llm:session/workflow.session"
params = [
  { name = "backend",       type = "string" },
  { name = "system-prompt", type = "string" },
  { name = "max-turns",     type = "u32" },
]
return_type = "result<string, string>"
location = "workflow/session.js"
content_digest = "sha256:fc5f550e78c9a7fea429bdeb7f7a31016b382c8f2ac51b34ce577f5f5fccb1fb"

# The turn loop, split out so the frontend can stop it with the cancel RPC. The
# `-cancellable` suffix marks the child as externally cancellable (it does not
# change structured concurrency; the parent still awaits and cleans up the
# container). workflow.session calls it directly.
[[workflow_js]]
ffqn = "agent-backed-llm:session/loop.agent-loop-cancellable"
params = [
  { name = "socket",        type = "string" },
  { name = "system-prompt", type = "string" },
  { name = "max-turns",     type = "u32" },
]
return_type = "result<string, string>"
location = "workflow/agent-loop.js"
content_digest = "sha256:fa2e7164dde2c0db619f0eb1360d1218e71759b81c09ba12140a2e54ccdb32a6"

# --- Chat-completions webhook -------------------------------------------------

[[webhook_endpoint_js]]
name = "chat-completions"
location = "webhook/chat.js"
routes = [
  { methods = ["POST"], route = "/v1/chat/completions" },
]
env_vars = [
  { key = "OBELISK_API_URL",  value = "${OBELISK_API_URL:-http://127.0.0.1:5105}" },
  { key = "AGENT_MAX_TURNS",  value = "${AGENT_MAX_TURNS:-200}" },
]
content_digest = "sha256:894a00e381d2ab66d0fb0a3a9a18b2ce5bee99b323e70323909fe568cca6a8c0"
# Both API calls go through ONE allowed_host so the OBELISK__API__TOKEN secret maps
# to a single placeholder. Declaring the same secret on two entries generates two
# distinct placeholders bound to one env var (last wins), so a request matching the
# other entry would carry an unsubstituted placeholder and get 401.
#   GET /v1/executions*            -> list + read created params to pair a request.
#   PUT /v1/executions/<id>/stub   -> inject the delta into a turn.request stub.
# The API port requires a bearer token since 0.40.0; Obelisk swaps the placeholder
# in the `authorization` header for the real token.
[[webhook_endpoint_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5105}"
methods = ["GET", "PUT"]
request_url_regex = "^(GET ${OBELISK_API_URL_REGEX:-http://127\\.0\\.0\\.1:5105}/v1/executions|PUT ${OBELISK_API_URL_REGEX:-http://127\\.0\\.0\\.1:5105}/v1/executions/[^/]+/stub$)"
[webhook_endpoint_js.allowed_host.secrets]
env_vars = ["OBELISK__API__TOKEN"]
replace_in = ["headers"]
